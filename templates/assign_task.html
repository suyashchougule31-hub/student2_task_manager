{% extends 'layout.html' %}
{% block content %}
<h2>Assign Task</h2>
<FORM METHOD="POST">
    <div class="mb-3">

        <LABEL >Student</LABEL>

        <select name="student_id" class="form-control" >

            {% for student in students %}

            <option value="{{ student.id }}">
                {{ student.first_name }} {{ student.last_name }}
            </option>

            {% endfor %}

        </select>

    </div>

    <div class="mb-3">

        <LABEL >Task</LABEL>


        <select name="task_id" class="form-control" >

            {% for task in tasks %}

            <option value="{{ task.task_id }}">
                {{ task.task_name }}
            </option>
            {% endfor %}
        </select>
    </div>

    <button 
      type="submit" class="btn btn-primary"> 
        Assign Task
   
    </button>
</FORM>
{% endblock %}
