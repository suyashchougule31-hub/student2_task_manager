{% extends 'layout.html' %}
{% block content %}

<h1>Students</h1>

<table id="students_table"
 class="table table-bordered table-striped lable-hover ">
    <thead>
        <tr>
            <th>ID</th>
            <th>NAME</th>
            <th>COURSE</th>
        </tr>
    </thead>

    <tbody>
        {% for student in students %}
        <tr>
            <td>{{ student.id }}</td>
            <td>{{ student.first_name }} {{ student.last_name }}</td>
            <td>{{ student.course }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}

{% block scripts %}



{% endblock %}
